<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Running — Found By AI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #07070f;
  color: #eae6f5;
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  max-width: 560px;
  width: 100%;
  text-align: center;
}
.icon { font-size: 48px; margin-bottom: 24px; display: block; }
.eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #38aef5;
  margin-bottom: 16px;
}
h1 { font-size: 28px; font-weight: 300; line-height: 1.3; margin-bottom: 16px; }
h1 strong { font-weight: 500; color: #38aef5; }
p { font-size: 15px; color: #9691b0; line-height: 1.7; margin-bottom: 12px; }
.divider { width: 40px; height: 1px; background: #1c1c30; margin: 24px auto; }
.note { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #5e5c7a; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="card">
  <span class="icon">&#9989;</span>
  <div class="eyebrow">Found By AI</div>
  <h1>Your audit is <strong>running.</strong></h1>
  <p>Your AI Visibility Report will be ready within 5 to 7 minutes. Check your email for the direct link to your report.</p>
  <div class="divider"></div>
  <p class="note">foundbyai.com.au</p>
</div>
</body>
</html>
