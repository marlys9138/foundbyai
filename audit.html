<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QYMW8SWGVJ"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Found By AI — Get Your AI Visibility Score</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f9f5ef; color: #2c2c2c; font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.card { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 600px; width: 100%; box-shadow: 0 4px 32px rgba(0,0,0,0.08); }
.logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #8B6F47; margin-bottom: 32px; letter-spacing: 0.05em; }
h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
.sub { color: #666; font-size: 0.95rem; margin-bottom: 36px; line-height: 1.6; }
.field { margin-bottom: 20px; }
label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #444; text-transform: uppercase; letter-spacing: 0.05em; }
input, select, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #e0d9d0; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; background: #faf8f5; color: #2c2c2c; transition: border-color 0.2s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #8B6F47; }
textarea { resize: vertical; min-height: 80px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
btn, button[type=submit] { width: 100%; padding: 16px; background: #2c2c2c; color: #f9f5ef; border: none; border-radius: 8px; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.2s, opacity 0.2s; }
button[type=submit]:hover:not(:disabled) { background: #444; }
button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; }
.note { font-size: 0.8rem; color: #999; text-align: center; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Found By AI — Powered by Edge Studio</div>
  <h1>Get Your AI Visibility Score</h1>
  <p class="sub">We run 20 purchase-intent prompts across Claude, ChatGPT, and Perplexity. Your report lands in your inbox within 60 minutes.</p>

  <form id="auditForm">
    <div class="field">
      <label>Brand Name *</label>
      <input type="text" name="Brand Name" required placeholder="e.g. frank body">
    </div>
    <div class="field">
      <label>Website URL *</label>
      <input type="url" name="Website URL" required placeholder="https://">
    </div>
    <div class="field">
      <label>Product / Service Category *</label>
      <input type="text" name="Product Category" required placeholder="e.g. Skincare & Beauty">
    </div>
    <div class="field">
      <label>Top Product 1 — Name and key specs *</label>
      <textarea name="Top Product 1 — Name and key specs" required placeholder="Product name and 1-2 sentences describing what makes it special"></textarea>
    </div>
    <div class="field">
      <label>Top Product 2 — Name and key specs</label>
      <textarea name="Top Product 2 — Name and key specs" placeholder="Optional"></textarea>
    </div>
    <div class="field">
      <label>Top Product 3 — Name and key specs</label>
      <textarea name="Top Product 3 — Name and key specs" placeholder="Optional"></textarea>
    </div>
    <div class="field">
      <label>Who are your main competitors?</label>
      <input type="text" name="Competitors" placeholder="e.g. Brand A, Brand B, Brand C">
    </div>
    <div class="field">
      <label>What problem does your brand solve?</label>
      <textarea name="Problem Statement" placeholder="Describe the core customer pain point you address"></textarea>
    </div>
    <div class="field">
      <label>Certifications or trust signals</label>
      <input type="text" name="Certifications" placeholder="e.g. B Corp, USDA Organic, ISO 9001">
    </div>
    <div class="row">
      <div class="field">
        <label>Price Range</label>
        <input type="text" name="Price Range" placeholder="e.g. $30-$150">
      </div>
      <div class="field">
        <label>Return Policy</label>
        <input type="text" name="Return Policy" placeholder="e.g. 30-day free returns">
      </div>
    </div>
    <div class="field">
      <label>Access Token *</label>
      <input type="text" name="Access Token" required placeholder="Your access token">
    </div>
    <div class="field">
      <label>Email Address *</label>
      <input type="email" name="email" required placeholder="Report delivered here">
    </div>
    <button type="submit" id="submitBtn">Run My Audit</button>
    <p class="note">Your report will arrive within 60 minutes.</p>
  </form>
</div>

<script>
(function() {
  var submitted = false;
  var form = document.getElementById('auditForm');
  var btn = document.getElementById('submitBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (submitted) return;
    submitted = true;
    btn.disabled = true;
    btn.textContent = 'Sending...';

    var data = {};
    var elements = form.elements;
    for (var i = 0; i < elements.length; i++) {
      if (elements[i].name) {
        data[elements[i].name] = elements[i].value;
      }
    }

    fetch('https://edgestudio.app.n8n.cloud/webhook/5a2ffa16-3fdc-44fc-937a-436d6b9c6df3', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(function() {});

    setTimeout(function() {
      window.location.href = 'https://foundbyai.com.au/submitted';
    }, 500);
  });
})();
</script>
</body>
</html>
