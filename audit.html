<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Your Brand — Found By AI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #07070f;
  color: #eae6f5;
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  padding: 48px 24px;
}
.container {
  max-width: 640px;
  margin: 0 auto;
}
.eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #38aef5;
  margin-bottom: 16px;
}
h1 {
  font-size: 32px;
  font-weight: 300;
  line-height: 1.25;
  margin-bottom: 12px;
  color: #eae6f5;
}
h1 strong { font-weight: 600; color: #38aef5; }
.desc {
  font-size: 15px;
  color: #9691b0;
  line-height: 1.7;
  margin-bottom: 40px;
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #5e5c7a;
  margin-bottom: 8px;
}
label .required { color: #38aef5; margin-left: 3px; }
input, textarea {
  width: 100%;
  background: #0d0d1a;
  border: 1px solid #1c1c30;
  color: #eae6f5;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  border-radius: 0;
}
input:focus, textarea:focus {
  border-color: #38aef5;
}
textarea { resize: vertical; min-height: 72px; }
.divider {
  border: none;
  border-top: 1px solid #1c1c30;
  margin: 32px 0;
}
button[type=submit] {
  background: #38aef5;
  color: #07070f;
  border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 16px 40px;
  cursor: pointer;
  font-weight: 500;
  width: 100%;
  transition: opacity 0.2s;
}
button[type=submit]:hover { opacity: 0.85; }
.footer-note {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #2a2a45;
  letter-spacing: 0.1em;
  text-align: center;
  margin-top: 24px;
}
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">Found By AI</div>
  <h1>Submit your brand for an <strong>AI Visibility Audit.</strong></h1>
  <p class="desc">Your report will be ready within 5 to 7 minutes and delivered to your email. You will receive a score out of 20 across 20 purchase-intent prompts, plus 6 content assets to improve your AI visibility.</p>

  <form method="POST" action="https://edgestudio.app.n8n.cloud/form/c95cbbce-c8ec-4524-a14c-36474a0afe46">

    <div class="form-group">
      <label for="brand-name">Brand Name <span class="required">*</span></label>
      <input type="text" id="brand-name" name="Brand Name" required placeholder="e.g. frank body">
    </div>

    <div class="form-group">
      <label for="website-url">Website URL <span class="required">*</span></label>
      <input type="url" id="website-url" name="Website URL" required placeholder="https://yourwebsite.com">
    </div>

    <div class="form-group">
      <label for="product-category">Product Category <span class="required">*</span></label>
      <input type="text" id="product-category" name="Product Category" required placeholder="e.g. Skincare, Supplements, Pet Food">
    </div>

    <hr class="divider">

    <div class="form-group">
      <label for="product-1">Top Product 1 — Name and key specs <span class="required">*</span></label>
      <textarea id="product-1" name="Top Product 1 — Name and key specs" required placeholder="e.g. Original Coffee Scrub — exfoliating body scrub with Robusta coffee, sea salt, sweet almond oil"></textarea>
    </div>

    <div class="form-group">
      <label for="product-2">Top Product 2 — Name and key specs</label>
      <textarea id="product-2" name="Top Product 2 — Name and key specs" placeholder="Optional"></textarea>
    </div>

    <div class="form-group">
      <label for="product-3">Top Product 3 — Name and key specs</label>
      <textarea id="product-3" name="Top Product 3 — Name and key specs" placeholder="Optional"></textarea>
    </div>

    <hr class="divider">

    <div class="form-group">
      <label for="competitors">Top 3 Competitors (brand names)</label>
      <input type="text" id="competitors" name="Top 3 Competitors (brand names)" placeholder="e.g. Scrub Love, Tree Hut, Sugar Bear">
    </div>

    <div class="form-group">
      <label for="customer-problem">Primary customer problem you solve</label>
      <textarea id="customer-problem" name="Primary customer problem you solve" placeholder="e.g. Dry, uneven skin texture that doesn't respond to regular moisturisers"></textarea>
    </div>

    <div class="form-group">
      <label for="certifications">Certifications</label>
      <input type="text" id="certifications" name="Certifications" placeholder="e.g. COSMOS Organic, Leaping Bunny, B Corp">
    </div>

    <div class="form-group">
      <label for="price-range">Price range</label>
      <input type="text" id="price-range" name="Price range" placeholder="e.g. AUD $18 — $55">
    </div>

    <div class="form-group">
      <label for="return-policy">Return or guarantee policy</label>
      <input type="text" id="return-policy" name="Return or guarantee policy" placeholder="e.g. 30-day money back guarantee">
    </div>

    <hr class="divider">

    <div class="form-group">
      <label for="access-token">Access token <span class="required">*</span></label>
      <input type="text" id="access-token" name="Access token" required placeholder="Provided in your purchase confirmation email">
    </div>

    <div class="form-group">
      <label for="contact-email">Contact email for results <span class="required">*</span></label>
      <input type="email" id="contact-email" name="Contact email for results" required placeholder="you@yourbrand.com">
    </div>

    <button type="submit">Run My AI Visibility Audit</button>

  </form>

  <p class="footer-note">foundbyai.com.au &nbsp;&mdash;&nbsp; by Edge Studio</p>
</div>
</body>
</html>
